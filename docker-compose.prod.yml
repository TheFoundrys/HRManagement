services:
  db:
    image: postgres:15-alpine
    container_name: hrms-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - hrms_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/hrms-app:latest
    container_name: hrms-app
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      ZKTECO_DEVICE_IP: ${ZKTECO_DEVICE_IP}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    ports:
      - "3000:3000"

volumes:
  hrms_postgres_data:
